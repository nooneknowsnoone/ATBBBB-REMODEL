<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Active Users</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Poppins font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">

  <style>
    :root {
      --body-bg:       #f9fafb;
      --card-bg:       #ffffff;
      --card-border:   #e5e7eb;
      --text-main:     #111827;
      --text-muted:    #6b7280;
      --primary:       #3b82f6;
      --shadow-sm:     0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -1px rgba(0,0,0,0.04);
      --shadow-md:     0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.05);
    }

    [data-bs-theme="dark"] {
      --body-bg:       #0f172a;
      --card-bg:       #1e293b;
      --card-border:   #334155;
      --text-main:     #f1f5f9;
      --text-muted:    #94a3b8;
      --primary:       #60a5fa;
    }

    body {
      background: var(--body-bg);
      color: var(--text-main);
      font-family: 'Poppins', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 6rem;
      transition: background 0.4s, color 0.4s;
    }

    .navbar {
      box-shadow: var(--shadow-sm);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
    }

    .user-card {
      padding: 1.25rem;
    }

    .avatar {
      width: 68px;
      height: 68px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid var(--primary);
      box-shadow: 0 4px 12px rgba(59,130,246,0.2);
    }

    .online-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 14px;
      height: 14px;
      background: #22c55e;
      border: 2px solid var(--card-bg);
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .user-info h5 {
      font-weight: 600;
      margin-bottom: 0.35rem;
      font-size: 1.15rem;
      letter-spacing: -0.01em;
    }

    .uptime {
      font-size: 0.92rem;
      color: var(--text-muted);
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
    }

    .footer {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--card-border);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    [data-bs-theme="dark"] .footer {
      background: rgba(15,23,42,0.75);
    }

    #theme-toggle {
      font-size: 1.5rem;
      cursor: pointer;
      transition: transform 0.3s;
    }

    #theme-toggle:hover {
      transform: rotate(30deg) scale(1.15);
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold fs-4" href="#">Active Users</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav align-items-center">
        <li class="nav-item"><a class="nav-link active px-3" href="#">Active</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="/">Home</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle px-3" href="#" role="button" data-bs-toggle="dropdown">Features</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Cookies Extractor</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Step-by-Step Guide</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <span id="theme-toggle" class="nav-link px-3 fs-4" title="Toggle theme">
            <i class="fa-solid fa-sun"></i>
          </span>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container" style="max-width: 960px; margin: 2rem auto;">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <h1 class="section-title mb-0">
      Current Online 
      <span id="onlineCount" class="badge bg-primary rounded-pill px-3 py-1 fs-6">0</span>
    </h1>
    <button onclick="refreshUsers()" class="btn btn-outline-primary btn-sm">
      <i class="fa-solid fa-rotate me-1"></i> Refresh
    </button>
  </div>

  <div class="row g-4" id="user_online"></div>

</div>

<!-- Footer -->
<div class="footer">
  <span>Manila Time: <span id="time"></span>  •  Ping: <span id="ping"></span> ms</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Theme toggle (same as home page)
const themeToggle = document.getElementById('theme-toggle');
const html = document.documentElement;

function setTheme(theme) {
  html.setAttribute('data-bs-theme', theme);
  localStorage.setItem('theme', theme);
  themeToggle.innerHTML = theme === 'dark' 
    ? '<i class="fa-solid fa-moon"></i>' 
    : '<i class="fa-solid fa-sun"></i>';
}

setTheme(localStorage.getItem('theme') || 
  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

themeToggle.addEventListener('click', () => {
  setTheme(html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
});

// Time & Ping
function updateTime() {
  document.getElementById('time').textContent = 
    new Date().toLocaleTimeString('en-US', { timeZone: 'Asia/Manila' });
}
setInterval(updateTime, 1000); updateTime();

function measurePing() {
  const t = Date.now();
  fetch(location.href + '?t=' + t, {method: 'HEAD', cache: 'no-store'})
    .then(() => document.getElementById('ping').textContent = Date.now() - t)
    .catch(() => document.getElementById('ping').textContent = '—');
}
setInterval(measurePing, 4000); measurePing();

// ────────────────────────────────────────────────
// Hide full name → "Jaymar Reyes" → "J**** R****"
function hideName(fullName) {
  if (!fullName || typeof fullName !== 'string') return 'User';

  const parts = fullName.trim().split(/\s+/);
  if (parts.length === 0) return 'User';

  return parts.map(part => {
    if (part.length <= 1) return part;
    return part[0] + '*'.repeat(part.length - 1);
  }).join(' ');
}

// ────────────────────────────────────────────────
// Format uptime
function timeFormat(seconds) {
  const days    = Math.floor(seconds / (3600 * 24));
  const hours   = Math.floor((seconds % (3600 * 24)) / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const secs    = seconds % 60;

  let str = '';
  if (days    > 0) str += `${days}d `;
  if (hours   > 0) str += `${hours}h `;
  if (minutes > 0) str += `${minutes}m `;
  str += `${secs}s`;

  return str.trim();
}

// ────────────────────────────────────────────────
// Load users
async function listOfAi() {
  const container = document.getElementById("user_online");
  const countEl = document.getElementById("onlineCount");

  try {
    const response = await fetch("/info");
    if (!response.ok) throw new Error("Network response was not ok");
    
    const data = await response.json();

    container.innerHTML = '';
    countEl.textContent = data.length || 0;

    if (data.length === 0) {
      container.innerHTML = `
        <div class="col-12 text-center py-5 text-muted">
          <i class="fa-solid fa-users-slash fa-3x mb-3 opacity-50"></i>
          <p>No users currently online</p>
        </div>`;
      return;
    }

    data.forEach(user => {
      const { name, thumbSrc, time } = user;

      const hiddenName = hideName(name);

      const col = document.createElement('div');
      col.className = 'col-12 col-md-6 col-lg-4';

      const card = document.createElement('div');
      card.className = 'card user-card h-100 position-relative';

      card.innerHTML = `
        <div class="d-flex align-items-center gap-3">
          <div class="position-relative flex-shrink-0">
            <img src="${thumbSrc || 'https://via.placeholder.com/68?text=?'}"
                 alt=""
                 class="avatar"
                 onerror="this.src='https://via.placeholder.com/68?text=?'">
            <div class="online-dot"></div>
          </div>
          <div class="flex-grow-1 user-info">
            <h5>${hiddenName}</h5>
            <p class="uptime mb-0 mt-1">
              <i class="fa-solid fa-clock me-1 text-muted"></i>
              Uptime: <span class="uptime-value">${timeFormat(time)}</span>
            </p>
          </div>
        </div>
      `;

      col.appendChild(card);
      container.appendChild(col);

      // Live counter
      let current = time;
      setInterval(() => {
        current++;
        const el = card.querySelector('.uptime-value');
        if (el) el.textContent = timeFormat(current);
      }, 1000);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = `
      <div class="col-12">
        <div class="alert alert-danger text-center py-4">
          <i class="fa-solid fa-triangle-exclamation fa-2x mb-3"></i><br>
          Failed to load online users<br>
          <small>${err.message}</small>
        </div>
      </div>`;
  }
}

function refreshUsers() {
  document.getElementById("user_online").innerHTML = `
    <div class="col-12 text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3 text-muted">Refreshing...</p>
    </div>`;
  listOfAi();
}

// Start
listOfAi();
</script>
</body>
</html>
